# Configuración de turnos — playas jul-sep 2026
# Edita aquí y ejecuta: python3 generar_turnos.py

periodo:
  inicio: "2026-07-01"
  fin: "2026-09-30"

# Días que no se recalculan al ejecutar generar_turnos.py
# - pasado_automatico: conserva hoy y días anteriores (por defecto true)
# - hasta: fija manualmente hasta qué fecha incluir (útil tras editar el CSV)
# Edición manual: cambia turnos_jul_sep_2026.csv y sube congelado.hasta al último día editado
# Publicar web: python3 generar_turnos.py copia turnos.html → docs/index.html; luego git push
# Columnas admin (mismo CSV):
#   cesantes     — refuerzos: Vacante 2; Esther (varios con ;)
#   vacaciones   — nombres separados por ; (solo manual, el generador no la rellena)
#   horas_extras — Nombre:horas; Nombre:horas (solo manual)
congelado:
  pasado_automatico: true
  hasta: "2026-07-03"

# 4 días trabajan, 2 libran. 3 grupos desfasados.
# Grupo 1 (Esther) desfase 4 → libra el 1 de julio.
rotacion:
  dias_trabajo: 4
  dias_libres: 2
  desfase_grupos: [4, 0, 2]  # grupo 1, 2, 3

# Grupo 1: Esther (pat) + Fernando + Vacante 1
# Grupo 2: Adrián (pat) + Claudio + Alex + Vacante 2
# Grupo 3: Vacante 3 (pat, hueco Pablo) + Robinson + Sergio + Vacante 4
# Plantilla: 8 socorristas + 3 patrones = 11
socorristas:
  - { nombre: "Fernando Franco Martins", grupo: 1 }
  - { nombre: "Vacante 1", grupo: 1 }
  - { nombre: "Claudio Pazos González", grupo: 2 }
  - { nombre: "Alejandro Panadeiros Covelo", grupo: 2 }
  - { nombre: "Vacante 2", grupo: 2 }
  - { nombre: "Robinson Ubaldo Rodríguez De Jesús", grupo: 3 }
  - { nombre: "Sergio Amoedo Domínguez", grupo: 3 }
  - { nombre: "Vacante 4", grupo: 3 }

patrones:
  - { nombre: "Esther Román Figueroa", grupo: 1 }
  - { nombre: "Adrián Bouzón Amoedo", grupo: 2 }
  - { nombre: "Vacante 3", grupo: 3 }

# De baja: no entran en rotación; su hueco es la vacante del mismo grupo
baja:
  - nombre: "Pablo Novoa Fernández"
    grupo: 3
    vacante: "Vacante 3"

preferencias:
  patron_chapela:
    - "Esther Román Figueroa"

  pareja_chapela:
    "Esther Román Figueroa": "Fernando Franco Martins"

  # Cuando Esther libra, Robinson cubre Chapela (4 días seguidos por bloque)
  socorrista_chapela:
    - "Robinson Ubaldo Rodríguez De Jesús"
    - "Sergio Amoedo Domínguez"

  # Zodiac: Claudio y Alex (4 días seguidos por bloque)
  socorrista_zodiac:
    - "Claudio Pazos González"
    - "Alejandro Panadeiros Covelo"

  # Si G2 libra, zodiac lo cubren Sergio/Robinson
  socorrista_zodiac_reserva:
    - "Sergio Amoedo Domínguez"
    - "Robinson Ubaldo Rodríguez De Jesús"

  llave_chapela_patrones:
    - "Esther Román Figueroa"
    - "Adrián Bouzón Amoedo"

  # Abrir puesto: preferencia Sergio/Robinson
  llave_cesantes_pool_g2:
    - "Sergio Amoedo Domínguez"
    - "Robinson Ubaldo Rodríguez De Jesús"

  llave_cesantes_pool_g3:
    - "Sergio Amoedo Domínguez"
    - "Robinson Ubaldo Rodríguez De Jesús"

  abrir_torre_pool:
    - "Sergio Amoedo Domínguez"
    - "Robinson Ubaldo Rodríguez De Jesús"
    - "Fernando Franco Martins"

  # Prefieren zodiac; pueden abrir puesto solo si no hay otro disponible
  prefieren_zodiac:
    - "Claudio Pazos González"
    - "Alejandro Panadeiros Covelo"
